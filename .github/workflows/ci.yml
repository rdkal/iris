name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e .
      - run: pip install pytest
      - run: python -m pytest -q

  browser-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[test]"
      - run: python -m playwright install --with-deps chromium
      - run: python -m pytest -q

  # Build the gallery on every PR and upload it as a downloadable artifact, so
  # the docs site can be reviewed before merging (GitHub Pages only publishes the
  # live site from `main`). Download "gallery-preview" from the run and open
  # index.html.
  preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e .
      - run: python -m iris.gallery build -o _site
      - uses: actions/upload-artifact@v4
        with:
          name: gallery-preview
          path: _site
          if-no-files-found: error
